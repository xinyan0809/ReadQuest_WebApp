<!-- Cookie Consent Banner -->
<section id="cookie-banner" class="position-fixed bottom-0 start-0 end-0">
    <div class="container py-3 px-4">
        <div class="row align-items-center g-3">

            <!-- Text side -->
            <div class="col-12 col-lg-8">
                <h4>
                    <i class="bi bi-cookie bi-check-circle-fill me-2"></i>
                    We use cookies
                </h4>
                <p class="mb-1 cookies-box">
                    ReadQuest uses cookies to give you a better reading experience. Here's what we store:
                </p>
                <div class="d-flex flex-column gap-1 cookies-box">
                    <span><i class="bi bi-check-circle-fill me-1"></i>
                        <strong>Essential</strong> — required for the site to function securely</span>
                    <span><i class="bi bi-check-circle-fill me-1"></i>
                        <strong>Authentication</strong> — remembers your login so you don't have to sign in on every
                        visit</span>
                    <span><i class="bi bi-check-circle-fill me-1"></i>
                        <strong>Preferences</strong> — remembers your settings between visits</span>
                </div>
            </div>

            <!-- Button side -->
            <div class="col-12 col-lg-4 d-flex flex-column justify-content-center gap-2">
                <button id="cookie-accept-btn" class="btn button_two py-2">
                    Accept all cookies
                </button>
                <button id="cookie-decline-btn" class="btn py-2">
                    Decline
                </button>
            </div>

        </div>
    </div>
</section>
