<!-- Update Progress -->
<section class="modal fade" id="updateProgress{{book.id}}" tabindex="-1" aria-labelledby="updateProgress"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg ">
        <div class="modal-content book_modal_card p-4">
            <div class="modal-header">
                <h3 class="modal-title" id="updateProgress">Update Progress</h3>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>


            <div class="modal-body">
                <div class="tab-pane fade show active" id="manualTab" role="tabpanel">
                    <form action="{% url 'readquest:update-progress' book.id %}" method="post"
                        enctype="multipart/form-data">
                        {% csrf_token %}
                        <!-- makes the user stay on the same page after clicking submit -->
                        <input type="hidden" name="next" value="{{ request.path }}">

                        <div class="d-flex row g-3">
                            <div class="book_cover_profile me-3 overflow-hidden col-6">
                                {% if book.cover_url %}
                                <img src="{{ book.cover_url }}" alt="{{ book.title }} cover" class="book_cover_img">
                                {% elif book.cover_image %}
                                <img src="{{ book.cover_image.url }}" alt="{{ book.title }} cover"
                                    class="book_cover_img">
                                {% endif %}
                            </div>
                            <div class="col-8">
                                <h3>{{book.title}}</h3>
                                <div class="col-12">

                                    <label class="form-label">Current page<span class="text-danger">*</span></label>
                                    <div class="col-3">
                                        <input type="number" class="form-control col-3" name="pages_read" required
                                            min="1" max="{{book.pages}}">
                                    </div>
                                    <p class="mt-1">out of {{book.pages}}</p>
                                </div>


                            </div>

                            <input type="hidden" name="blurb" value="User updated progress">
                        </div>

                        <!-- Update progress button -->
                        <div class="d-flex justify-content-end gap-2 mt-3">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="button btn">Update progress</button>

                        </div>
                    </form>
                </div>


            </div>
        </div>

    </div>
</section>
